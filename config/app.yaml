  asr_path: "C:\\Users\\kans\\.cache\\huggingface\\hub\\models--nvidia--parakeet-ctc-0.6b-vi\\snapshots\\b0493142b49458810324e3db8be9e8e07b4ebc17\\parakeet-ctc-0.6b-vi.nemo"
  diarization_path: "D:\\nvidia parakeet\\diar_streaming_sortformer_4spk-v2.nemo"

database:
  type: "memory"
